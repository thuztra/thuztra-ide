# THUZTRA: trimmed from upstream's ci-build-windows.yml (see THUZTRA.md).
# Manual-dispatch only, stable quality, x64 only, always produces the
# installer assets as artifacts. No signing, no release, no winget —
# those are beta-gated. DISABLE_UPDATE keeps the build from pointing at
# VSCodium's update server (we have none yet).

name: Build - Windows

on:
  workflow_dispatch:

env:
  APP_NAME: Thuztra
  BINARY_NAME: thuztra
  DISABLE_UPDATE: yes
  GH_REPO_PATH: ${{ github.repository }}
  ORG_NAME: ${{ github.repository_owner }}
  OS_NAME: windows
  VSCODE_QUALITY: stable

permissions: {}

jobs:
  compile:
    runs-on: windows-2022
    defaults:
      run:
        shell: bash
    env:
      VSCODE_ARCH: 'x64'
    outputs:
      BUILD_SOURCEVERSION: ${{ env.BUILD_SOURCEVERSION }}
      MS_COMMIT: ${{ env.MS_COMMIT }}
      MS_TAG: ${{ env.MS_TAG }}
      RELEASE_VERSION: ${{ env.RELEASE_VERSION }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js environment
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'

      - name: Setup Python 3
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Clone VSCode repo
        run: ./get_repo.sh

      - name: Build
        env:
          SHOULD_BUILD: yes
          SHOULD_BUILD_REH: no
          SHOULD_BUILD_REH_WEB: no
        run: ./build.sh

      - name: Compress vscode artifact
        run: |
          find vscode -type f -not -path "*/node_modules/*" -not -path "vscode/.build/node/*" -not -path "vscode/.git/*" > vscode.txt
          echo "vscode/.build/extensions/node_modules" >> vscode.txt
          echo "vscode/.git" >> vscode.txt
          tar -czf vscode.tar.gz -T vscode.txt

      - name: Upload vscode artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vscode
          path: ./vscode.tar.gz
          retention-days: 1

  build:
    needs:
      - compile
    runs-on: windows-2022
    defaults:
      run:
        shell: bash
    env:
      BUILD_SOURCEVERSION: ${{ needs.compile.outputs.BUILD_SOURCEVERSION }}
      MS_COMMIT: ${{ needs.compile.outputs.MS_COMMIT }}
      MS_TAG: ${{ needs.compile.outputs.MS_TAG }}
      RELEASE_VERSION: ${{ needs.compile.outputs.RELEASE_VERSION }}
      SHOULD_BUILD_REH: no
      SHOULD_BUILD_REH_WEB: no
      # The MSI's hardcoded build/windows/msi/vscodium.wxs references
      # VSCODIUM.EXE; our rebrand makes the binary Thuztra.exe, so WiX
      # can't resolve it (LGHT0094). MSI is enterprise-GPO-only — skip it
      # pre-beta; the .exe user/system installers + .zip are unconditional
      # and are the primary deliverables. Revisit (rebrand the .wxs) only
      # if MSI deployment is ever needed. See THUZTRA.md.
      SHOULD_BUILD_MSI: no
      SHOULD_BUILD_MSI_NOUP: no
      VSCODE_ARCH: 'x64'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js environment
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'

      - name: Setup Python 3
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Download vscode artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: vscode

      - name: Build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          npm_config_arch: 'x64'
          npm_config_target_arch: 'x64'
        run: ./build/windows/package.sh

      - name: Bundle Thuztra extensions
        run: ./bundle_extensions.sh

      - name: Prepare assets
        run: ./prepare_assets.sh

      - name: Prepare checksums
        run: ./prepare_checksums.sh

      - name: Upload assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bin-x64
          path: assets/
          retention-days: 7
# (workflow indexing nudge)
